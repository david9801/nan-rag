<!DOCTYPE html>
<html lang="es" class="h-full">
<!-- v4 - vanilla JS messages -->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RFC RAG — NaN Builders</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .prose-chat { line-height: 1.7; }
    .prose-chat p { margin-bottom: 0.75rem; }
    .prose-chat ul, .prose-chat ol { margin-left: 1.25rem; margin-bottom: 0.75rem; }
    .prose-chat li { margin-bottom: 0.25rem; }
    .prose-chat h1,.prose-chat h2,.prose-chat h3 { font-weight: 700; margin: 1rem 0 0.5rem; }
    .prose-chat code:not(pre code) {
      background: rgba(99,102,241,0.15); color: #a5b4fc;
      padding: 0.1em 0.4em; border-radius: 4px; font-size: 0.875em;
    }
    .prose-chat pre { margin: 0.75rem 0; border-radius: 8px; overflow-x: auto; }
    .prose-chat blockquote {
      border-left: 3px solid #6366f1; padding-left: 1rem;
      color: #94a3b8; margin: 0.75rem 0;
    }
    .prose-chat strong { color: #e2e8f0; }
    .typing-cursor::after {
      content: '▋'; animation: blink 0.7s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .chat-scroll { scroll-behavior: smooth; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#6366f1', dark: '#4f46e5', light: '#818cf8' }
          }
        }
      }
    }
  </script>
</head>

<body class="h-full bg-slate-950 text-slate-100 font-sans" x-data="chat()" x-init="init()">

<!-- ── Layout principal ──────────────────────────────────────────────────── -->
<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="hidden md:flex flex-col w-72 bg-slate-900 border-r border-slate-800 p-4 gap-4 shrink-0">

    <!-- Logo -->
    <div class="flex items-center gap-2 px-1 py-2">
      <div class="w-8 h-8 rounded-lg bg-brand flex items-center justify-center text-white font-bold text-sm">R</div>
      <div>
        <div class="font-semibold text-sm leading-tight">RFC RAG</div>
        <div class="text-xs text-slate-400">NaN Builders</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="bg-slate-800 rounded-xl p-3 text-xs space-y-1.5">
      <div class="flex justify-between">
        <span class="text-slate-400">Chunks indexados</span>
        <span class="font-mono text-brand-light" x-text="stats.chunks ?? '—'"></span>
      </div>
      <div class="flex justify-between">
        <span class="text-slate-400">Modelo embed</span>
        <span class="font-mono text-slate-300 truncate ml-2" x-text="stats.embed ?? '—'"></span>
      </div>
      <div class="flex justify-between">
        <span class="text-slate-400">Modelo LLM</span>
        <span class="font-mono text-slate-300 truncate ml-2" x-text="stats.llm ?? '—'"></span>
      </div>
    </div>

    <!-- Filtro de fuente -->
    <div>
      <label class="block text-xs text-slate-400 mb-1.5 font-medium">Filtrar por documento</label>
      <select
        x-model="filter"
        class="w-full bg-slate-800 border border-slate-700 text-sm rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand text-slate-200"
      >
        <option value="">Todos los documentos</option>
        <template x-for="rfc in indexedRfcs" :key="rfc">
          <option :value="rfc" x-text="rfcTitles[rfc] ? rfc + ' — ' + rfcTitles[rfc] : rfc"></option>
        </template>
      </select>
    </div>

    <!-- RFCs indexados -->
    <div class="flex-1 overflow-y-auto">
      <div class="text-xs text-slate-400 mb-2 font-medium">Documentos disponibles</div>
      <template x-if="indexedRfcs.length === 0">
        <div class="text-xs text-slate-500 italic">Sin documentos indexados todavía</div>
      </template>
      <div class="space-y-1">
        <template x-for="rfc in indexedRfcs" :key="rfc">
          <button
            @click="filter = filter === rfc ? '' : rfc"
            :class="filter === rfc
              ? 'bg-brand/20 text-brand-light border-brand/40'
              : 'bg-slate-800 text-slate-300 border-slate-700 hover:bg-slate-700'"
            class="w-full text-left text-xs px-3 py-2 rounded-lg border transition-colors"
          >
            <div class="font-mono font-medium" x-text="rfc"></div>
            <div class="text-slate-400 truncate mt-0.5" x-text="rfcTitles[rfc] ?? ''"></div>
          </button>
        </template>
      </div>
    </div>

    <!-- Botón nueva conversación -->
    <button
      @click="clearChat()"
      class="flex items-center gap-2 text-xs text-slate-400 hover:text-slate-200 transition-colors px-2 py-2 rounded-lg hover:bg-slate-800"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      Nueva conversación
    </button>
  </aside>

  <!-- Área principal -->
  <div class="flex-1 flex flex-col min-w-0">

    <!-- Header móvil -->
    <header class="md:hidden flex items-center justify-between px-4 py-3 bg-slate-900 border-b border-slate-800">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-lg bg-brand flex items-center justify-center text-white font-bold text-xs">R</div>
        <span class="font-semibold text-sm">RFC RAG</span>
      </div>
      <span x-show="filter" class="text-xs bg-brand/20 text-brand-light px-2 py-1 rounded-full border border-brand/30" x-text="filter"></span>
    </header>

    <!-- Mensajes -->
    <div
      id="chat-container"
      class="flex-1 overflow-y-auto chat-scroll px-4 py-6 space-y-6"
      x-ref="chatContainer"
    >
      <!-- Pantalla de bienvenida -->
      <div id="welcome-screen" class="flex flex-col items-center justify-center h-full gap-6 text-center px-4">
        <div class="w-16 h-16 rounded-2xl bg-brand/20 border border-brand/30 flex items-center justify-center">
          <svg class="w-8 h-8 text-brand-light" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-slate-100 mb-2">RFC RAG</h1>
          <p class="text-slate-400 text-sm max-w-sm">
            Pregunta sobre estándares técnicos de Internet. Las respuestas se basan exclusivamente en los RFCs indexados.
          </p>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 w-full max-w-lg" id="suggestions-grid">
        </div>
      </div>

      <!-- Lista de mensajes (gestionada por vanilla JS, sin Alpine reactivity) -->
      <div id="messages-list" class="hidden space-y-6"></div>

    </div>

    <!-- Input area -->
    <div class="border-t border-slate-800 bg-slate-900 px-4 py-4">
      <!-- Filtro activo badge (móvil) -->
      <template x-if="filter">
        <div class="flex items-center gap-2 mb-2">
          <span class="text-xs text-slate-400">Filtrando por:</span>
          <span class="text-xs bg-brand/20 text-brand-light px-2 py-0.5 rounded-full border border-brand/30 font-mono" x-text="filter"></span>
          <button @click="filter = ''" class="text-xs text-slate-500 hover:text-slate-300">✕</button>
        </div>
      </template>

      <div class="flex gap-3 items-end max-w-4xl mx-auto">
        <div class="flex-1 relative">
          <textarea
            x-ref="input"
            x-model="question"
            @keydown.enter.prevent="!$event.shiftKey && question.trim() && !loading && submit()"
            @input="autoResize($event.target)"
            placeholder="Pregunta sobre RFCs… (Enter para enviar, Shift+Enter para nueva línea)"
            rows="1"
            :disabled="loading"
            class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 pr-12 text-sm text-slate-200 placeholder-slate-500
                   focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent
                   resize-none overflow-hidden transition-colors disabled:opacity-50"
            style="max-height: 160px;"
          ></textarea>
        </div>
        <button
          @click="submit()"
          :disabled="!question.trim() || loading"
          class="shrink-0 w-10 h-10 rounded-xl bg-brand hover:bg-brand-dark disabled:opacity-40 disabled:cursor-not-allowed
                 flex items-center justify-center transition-colors"
        >
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
        </button>
      </div>
      <div class="text-center mt-2 text-xs text-slate-600">
        Límite: 5 peticiones/min · 100/día por IP
      </div>
    </div>

  </div>
</div>

<script>
  // ── Vanilla JS message rendering (no Alpine reactivity needed) ────────────────

  let _msgCount = 0;

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function scoreClass(s) {
    if (s > 0.7) return 'bg-green-900/50 text-green-400';
    if (s > 0.5) return 'bg-yellow-900/50 text-yellow-400';
    return 'bg-slate-700 text-slate-400';
  }

  function appendUserMessage(text) {
    const list = document.getElementById('messages-list');
    document.getElementById('welcome-screen').classList.add('hidden');
    list.classList.remove('hidden');
    const div = document.createElement('div');
    div.className = 'flex justify-end';
    div.innerHTML = `
      <div class="max-w-[80%]">
        <div class="bg-brand rounded-2xl rounded-tr-sm px-4 py-3 text-sm text-white">${escapeHtml(text)}</div>
      </div>`;
    list.appendChild(div);
    scrollChat();
    return div;
  }

  function appendAssistantPlaceholder() {
    const list = document.getElementById('messages-list');
    const id = 'msg-' + (++_msgCount);
    const div = document.createElement('div');
    div.id = id;
    div.className = 'flex justify-start';
    div.innerHTML = `
      <div class="max-w-[90%] w-full">
        <div class="flex items-start gap-3">
          <div class="w-7 h-7 rounded-lg bg-slate-700 flex items-center justify-center shrink-0 mt-0.5">
            <svg class="w-4 h-4 text-indigo-400" fill="currentColor" viewBox="0 0 20 20">
              <path d="M2 5a2 2 0 012-2h7a2 2 0 012 2v4a2 2 0 01-2 2H9l-3 3v-3H4a2 2 0 01-2-2V5z"/>
              <path d="M15 7v2a4 4 0 01-4 4H9.828l-1.766 1.767c.28.149.599.233.938.233h2l3 3v-3h2a2 2 0 002-2V9a2 2 0 00-2-2h-1z"/>
            </svg>
          </div>
          <div class="flex-1 min-w-0">
            <div class="loader flex items-center gap-1.5 py-2">
              <span class="w-2 h-2 bg-indigo-500 rounded-full animate-bounce" style="animation-delay:0ms"></span>
              <span class="w-2 h-2 bg-indigo-500 rounded-full animate-bounce" style="animation-delay:150ms"></span>
              <span class="w-2 h-2 bg-indigo-500 rounded-full animate-bounce" style="animation-delay:300ms"></span>
            </div>
            <div class="content hidden">
              <div class="prose-chat text-sm text-slate-200 answer-text"></div>
              <div class="sources-section mt-3 hidden"></div>
              <div class="error-text hidden mt-2 text-xs text-red-400 bg-red-900/20 border border-red-900/40 rounded-lg px-3 py-2"></div>
            </div>
          </div>
        </div>
      </div>`;
    list.appendChild(div);
    scrollChat();
    return id;
  }

  function showAssistantError(id, msg) {
    const el = document.getElementById(id);
    if (!el) return;
    el.querySelector('.loader').classList.add('hidden');
    el.querySelector('.content').classList.remove('hidden');
    const err = el.querySelector('.error-text');
    err.textContent = msg;
    err.classList.remove('hidden');
    scrollChat();
  }

  async function showAssistantAnswer(id, answer, sources) {
    const el = document.getElementById(id);
    if (!el) return;
    el.querySelector('.loader').classList.add('hidden');
    const content = el.querySelector('.content');
    content.classList.remove('hidden');

    const answerEl = el.querySelector('.answer-text');
    answerEl.classList.add('typing-cursor');

    // Typewriter effect — direct DOM, no reactivity needed
    const chunkSize = 4;
    let rendered = '';
    for (let i = 0; i < answer.length; i += chunkSize) {
      rendered += answer.slice(i, i + chunkSize);
      if (i % 80 === 0) {
        answerEl.innerHTML = marked.parse(rendered, { breaks: true, gfm: true });
        scrollChat();
        await new Promise(r => setTimeout(r, 8));
      }
    }
    // Final render with full text
    answerEl.innerHTML = marked.parse(answer, { breaks: true, gfm: true });
    answerEl.classList.remove('typing-cursor');

    // Sources
    if (sources && sources.length > 0) {
      const sec = el.querySelector('.sources-section');
      sec.classList.remove('hidden');
      let open = false;
      sec.innerHTML = `
        <button class="toggle-src flex items-center gap-1.5 text-xs text-slate-400 hover:text-slate-200 transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
          </svg>
          <span>${sources.length} fuentes</span>
          <svg class="chevron w-3 h-3 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>
        <div class="src-list mt-2 space-y-1.5 hidden">
          ${sources.map(s => `
            <div class="bg-slate-800/60 border border-slate-700 rounded-lg px-3 py-2 text-xs">
              <div class="flex items-center justify-between gap-2">
                <div class="flex items-center gap-2 min-w-0">
                  <span class="font-mono text-indigo-400 font-medium shrink-0">${escapeHtml(s.rfc_id.toUpperCase())}</span>
                  <span class="text-slate-400 truncate">${escapeHtml(s.section_title)}</span>
                </div>
                <span class="shrink-0 font-mono text-xs px-1.5 py-0.5 rounded ${scoreClass(s.score)}">${s.score.toFixed(2)}</span>
              </div>
              <div class="text-slate-500 truncate mt-0.5">${escapeHtml(s.title)}</div>
            </div>`).join('')}
        </div>`;
      sec.querySelector('.toggle-src').addEventListener('click', () => {
        open = !open;
        sec.querySelector('.src-list').classList.toggle('hidden', !open);
        sec.querySelector('.chevron').style.transform = open ? 'rotate(180deg)' : '';
      });
    }

    scrollChat();
  }

  function scrollChat() {
    const c = document.getElementById('chat-container');
    if (c) c.scrollTop = c.scrollHeight;
  }

  // ── Alpine component (form + sidebar only) ────────────────────────────────────

  function chat() {
    return {
      question: '',
      filter: '',
      loading: false,
      hasMessages: false,
      stats: {},
      indexedRfcs: [],
      rfcTitles: {},
      suggestions: [
        '¿Qué es PKCE y por qué es necesario para clientes públicos?',
        '¿Cómo funciona el Authorization Code Grant de OAuth 2.0?',
        '¿Cuáles son las diferencias entre TLS 1.2 y TLS 1.3?',
        '¿Qué campos obligatorios tiene un JWT según el RFC 7519?',
      ],

      async init() {
        await Promise.all([this.loadStats(), this.loadIndexed(), this.loadCatalog()]);
        // Render suggestion buttons
        const grid = document.getElementById('suggestions-grid');
        if (grid) {
          this.suggestions.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'text-left text-xs bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl p-3 text-slate-300 transition-colors';
            btn.textContent = s;
            btn.addEventListener('click', () => { this.question = s; this.submit(); });
            grid.appendChild(btn);
          });
        }
      },

      async loadStats() {
        try {
          const data = await (await fetch('/')).json();
          this.stats = { chunks: data.chunks_indexed, embed: data.embed_model, llm: data.llm_model };
        } catch {}
      },

      async loadIndexed() {
        try {
          const data = await (await fetch('/rfcs/indexed')).json();
          this.indexedRfcs = data.indexed ?? [];
        } catch {}
      },

      async loadCatalog() {
        try {
          const data = await (await fetch('/rfcs')).json();
          this.rfcTitles = Object.fromEntries(Object.entries(data).map(([k, v]) => [k, v.title]));
        } catch {}
      },

      async submit() {
        if (!this.question.trim() || this.loading) return;

        const q = this.question.trim();
        this.question = '';
        this.$nextTick(() => {
          if (this.$refs.input) this.$refs.input.style.height = 'auto';
        });

        this.hasMessages = true;
        appendUserMessage(q);
        const msgId = appendAssistantPlaceholder();
        this.loading = true;

        try {
          const resp = await fetch('/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: q, rfc_filter: this.filter || null, stream: false }),
          });

          if (resp.status === 429) {
            showAssistantError(msgId, 'Límite de peticiones alcanzado. Espera un momento antes de continuar.');
            return;
          }
          if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            showAssistantError(msgId, err.detail ?? `Error ${resp.status}`);
            return;
          }

          const data = await resp.json();
          await showAssistantAnswer(msgId, data.answer ?? '', data.sources ?? []);

          // Refresh chunk count
          try { this.stats.chunks = (await (await fetch('/')).json()).chunks_indexed; } catch {}

        } catch (e) {
          showAssistantError(msgId, 'Error de red. Comprueba la conexión.');
        } finally {
          this.loading = false;
          this.$nextTick(() => this.$refs.input?.focus());
        }
      },

      clearChat() {
        const list = document.getElementById('messages-list');
        list.innerHTML = '';
        list.classList.add('hidden');
        document.getElementById('welcome-screen').classList.remove('hidden');
        this.hasMessages = false;
        this.question = '';
        this.$nextTick(() => this.$refs.input?.focus());
      },

      autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 160) + 'px';
      },
    };
  }
</script>
</body>
</html>
